# Sample YAML configuration with optional substitution variables
# This demonstrates how to set values for all the @...@ variables
# that appear in input.general.in and input.operations.in

# Required fields
machine: "Test Machine"
threads: [1, 4, 8]
hi: [3000, 4000, 4000]
lo: [120, 120, 120]
step: [120, 120, 120]
config: "haswell"

# Optional substitution variables (all default to -1 if not specified)
# Input file: input.general.in
dt: "dcs"                 # Datatypes: 's', 'd', 'c', 'z', or combinations like 'dcs'
mstorage: "cgr"           # Matrix storage: 'c', 'g', 'r', or combinations
vstorage: "crji"          # Vector storage: 'c', 'j', 'r', 'i', or combinations
repeat: "3"               # Number of repeats per experiment
1m: "1"                   # Enable 1m implementations (0 or 1)
native: "1"               # Enable native implementations (0 or 1)

# Input file: input.operations.in
level2: "1"               # Enable level-2 operations (0 or 1)
level3: "1"               # Enable level-3 operations (0 or 1)

# Any other user-defined fields will be stored as JSON in the "comment" field
